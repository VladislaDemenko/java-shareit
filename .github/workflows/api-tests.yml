
  name: API Tests

  on:
    pull_request:
      branches: [ main, master ]
    push:
      branches: [ main, master ]

  jobs:
    test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Setup JDK 11
          uses: actions/setup-java@v3
          with:
            java-version: '11'
            distribution: 'temurin'

        - name: Build application
          run: |
            mvn clean package -DskipTests

        - name: Make scripts executable
          run: |
            if [ -f ./tests/.github/workflows/run.sh ]; then
              chmod +x ./tests/.github/workflows/run.sh
            fi
            if [ -f ./tests/.github/workflows/wait-for-it.sh ]; then
              chmod +x ./tests/.github/workflows/wait-for-it.sh
            fi

        - name: Start application
          run: |
            echo "Starting application..."
            if [ -f ./tests/.github/workflows/run.sh ]; then
              ./tests/.github/workflows/run.sh > app.log 2>&1 &
            else
              java -jar target/*.jar > app.log 2>&1 &
            fi
            APP_PID=$!
            echo $APP_PID > app.pid
            echo "Application PID: $APP_PID"
            
            sleep 10
            
            if ps -p $APP_PID > /dev/null; then
              echo "✅ Application is running"
            else
              echo "❌ Application died immediately"
              cat app.log
              exit 1
            fi

        - name: Wait for application to be ready
          run: |
            echo "Waiting for application on port 8080..."
            for i in {1..60}; do
              if curl -s -f http://localhost:8080 > /dev/null 2>&1; then
                echo "✅ Application is ready on port 8080"
                exit 0
              fi
              echo "Attempt $i/60: Waiting for application..."
              sleep 2
            done
            
            echo "❌ Application failed to start within 120 seconds"
            echo "=== Application logs ==="
            cat app.log
            exit 1

        - name: Run API tests
          run: |
            echo "Running API tests..."
            mvn test

        - name: Upload logs on failure
          if: failure()
          uses: actions/upload-artifact@v4
          with:
            name: application-logs
            path: app.log
